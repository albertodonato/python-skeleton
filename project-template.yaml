project:
  # The name of the package for install purposes (e.g. PyPI)
  name: python-skeleton

  # Name of the Python package, by default derived from the name (replacing
  # hyphens with upderscores)
  package: python_skeleton

  # Brief description of the project (for README title and package docstring)
  title: Python project skeleton

  # Project URL
  url: https://github.com/albertodonato/python-skeleton

  # Supported Python versions (the highest one is used in CI jobs that don't use a matrix)
  python-versions:
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"

author:
  # Full name of the author/maintainer
  name: "Alberto Donato"

  # E-mail of the author/maintainer
  email: "alberto@albertodonato.net"
