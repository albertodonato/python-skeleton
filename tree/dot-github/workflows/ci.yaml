name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    uses: albertodonato/github-workflows/.github/workflows/run-tox.yaml@2f91268eb6ce8e14f52a69e1925bab45d3e240c2 # v0.0.6
    with:
      python-version: "{{ project.python_versions.max }}"
      tox-env: lint

  check:
    name: Check
    uses: albertodonato/github-workflows/.github/workflows/run-tox.yaml@2f91268eb6ce8e14f52a69e1925bab45d3e240c2 # v0.0.6
    with:
      python-version: {{ gh_var("matrix.python-version") }}
      tox-env: check

    strategy:
      matrix:
        python-version:
          {% for version in project.python_versions.supported_versions -%}
          - "{{ version }}"
          {% endfor %}
  test:
    name: Unit tests
    uses: albertodonato/github-workflows/.github/workflows/run-tox.yaml@2f91268eb6ce8e14f52a69e1925bab45d3e240c2 # v0.0.6
    with:
      python-version: {{ gh_var("matrix.python-version") }}
      tox-env: py

    strategy:
      matrix:
        python-version:
          {% for version in project.python_versions.supported_versions -%}
          - "{{ version }}"
          {% endfor %}
