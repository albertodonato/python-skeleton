project:
  # The name of the package for install purposes (e.g. PyPI)
  name: python-skeleton

  # Package version. Defaults to 0.0.1
  version: "0.0.1"

  # Name of the Python package, by default derived from the name (replacing
  # hyphens with upderscores).
  package: python_skeleton

  # Brief description of the project (for README title and package docstring)
  title: Python project skeleton

  # The project license indicator
  license: Apache-2.0

  # Project URL
  urls:
    Issue Tracker: https://github.com/albertodonato/python-skeleton/issues
    Source Code: https://github.com/albertodonato/python-skeleton
    Documentation: https://github.com/albertodonato/python-skeleton
    Homepage: https://github.com/albertodonato/python-skeleton

  # Supported Python versions
  python-versions:
    min: "3.12"
    max: "3.14"

author:
  # Full name of the author/maintainer
  name: Alberto Donato

  # E-mail of the author/maintainer
  email: alberto@albertodonato.net


config:
  # Whether to include docs setup
  include-docs: true
  # Whether to use uv lock file
  use-uv-lock: true
